apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mobility-backend
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ablamine-dev/mobility-app.git
    targetRevision: HEAD
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true